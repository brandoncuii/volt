name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Server typecheck
        run: npx tsc --noEmit
        working-directory: server

      - name: Server tests
        run: npx vitest run
        working-directory: server

      - name: Client typecheck
        run: npx tsc -b
        working-directory: client

      - name: Client lint
        run: npx eslint .
        working-directory: client

      - name: Infra typecheck
        run: npx tsc --noEmit
        working-directory: infra
